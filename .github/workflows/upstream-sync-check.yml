name: Upstream Sync Check

on:
  schedule:
    - cron: '23 8 * * *'  # 每天 UTC 08:23 (北京 16:23)
  workflow_dispatch:       # 支持手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check upstream commits
        id: upstream
        run: |
          git remote add upstream https://github.com/Arron196/CLIProxyAPI.git 2>/dev/null || true
          git fetch upstream main --quiet

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          BEHIND=$(git rev-list --count HEAD..upstream/main)

          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          if [ "$BEHIND" -gt 0 ]; then
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            COMMITS=$(git log --oneline HEAD..upstream/main | head -10)
            echo "## Upstream has $BEHIND new commit(s)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "## Up to date with upstream" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Claude Code versions
        id: versions
        run: |
          CLI_VER=$(curl -sf https://registry.npmjs.org/@anthropic-ai/claude-code/latest | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          SDK_VER=$(curl -sf https://registry.npmjs.org/@anthropic-ai/sdk/latest | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "cli=$CLI_VER" >> $GITHUB_OUTPUT
          echo "sdk=$SDK_VER" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Claude Code Versions" >> $GITHUB_STEP_SUMMARY
          echo "- CLI: $CLI_VER" >> $GITHUB_STEP_SUMMARY
          echo "- SDK: $SDK_VER" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if upstream needs sync
        if: steps.upstream.outputs.needs_sync == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const behind = '${{ steps.upstream.outputs.behind }}';
            const title = `[Auto] Upstream has ${behind} new commit(s) to sync`;

            // Check if open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Arron196/CLIProxyAPI is **${behind}** commits ahead.\n\nCLI: ${{ steps.versions.outputs.cli }}, SDK: ${{ steps.versions.outputs.sdk }}\n\n\`\`\`bash\ncd my-cpa && git fetch upstream && git merge upstream/main && ./build.sh deploy\n\`\`\`\n\nLast checked: ${new Date().toISOString()}`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `Arron196/CLIProxyAPI is **${behind}** commits ahead.\n\nCLI: ${{ steps.versions.outputs.cli }}, SDK: ${{ steps.versions.outputs.sdk }}\n\n\`\`\`bash\ncd my-cpa && git fetch upstream && git merge upstream/main && ./build.sh deploy\n\`\`\``,
                labels: ['upstream-sync']
              });
            }
